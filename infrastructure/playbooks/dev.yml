---
- name: Start ZBBS development servers
  hosts: all
  become: yes
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Load secrets
      include_tasks: ../tasks/load-secrets.yml

  tasks:
    - name: Ensure PostgreSQL is running
      service:
        name: postgresql
        state: started

    - name: Deploy application environment variables
      template:
        src: ../templates/zbbs-env.sh.j2
        dest: /etc/profile.d/zbbs.sh
        mode: '0644'

    - name: Ensure nginx is running
      service:
        name: nginx
        state: started

    - name: Check if Symfony dev server is already running
      shell: pgrep -f "symfony server:start" || true
      register: symfony_running
      changed_when: false

    - name: Start Symfony dev server
      shell: |
        . /etc/profile.d/zbbs.sh && cd {{ project_root }}/api && nohup symfony server:start --port=8001 --no-tls --daemon > /dev/null 2>&1
      become_user: "{{ app_user }}"
      when: symfony_running.stdout == ""

    - name: Check if village dev server is already running
      shell: pgrep -f "vite.*village" || true
      register: village_running
      changed_when: false

    - name: Start village dev server
      shell: |
        . /etc/profile.d/zbbs.sh && cd {{ project_root }}/clients/village && nohup npx vite --port=4300 --host=0.0.0.0 > /tmp/village-dev.log 2>&1 &
      become_user: "{{ app_user }}"
      when: village_running.stdout == ""

    - name: Wait for Symfony to be ready
      uri:
        url: "http://localhost:8001"
        status_code: [200, 404, 500]
      register: symfony_result
      until: symfony_result is not failed
      retries: 10
      delay: 2
      ignore_errors: yes

    - name: Wait for village dev server to be ready
      uri:
        url: "http://localhost:4300"
        status_code: [200]
      register: village_result
      until: village_result is not failed
      retries: 15
      delay: 3
      ignore_errors: yes

    - name: Display dev server status
      debug:
        msg: |
          Development servers:

          Symfony API:  http://{{ server_name }}/api
          Village:      http://localhost:4300

          Symfony direct:  http://localhost:8001
