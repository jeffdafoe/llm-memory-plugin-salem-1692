---
- name: Start ZBBS development servers
  hosts: all
  become: yes
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Load secrets
      include_tasks: ../tasks/load-secrets.yml

  tasks:
    - name: Ensure PostgreSQL is running
      service:
        name: postgresql
        state: started

    - name: Create env directory
      file:
        path: /etc/zbbs
        state: directory
        mode: "0750"

    - name: Deploy environment file
      template:
        src: ../templates/zbbs-env.j2
        dest: /etc/zbbs/env
        mode: "0640"

    - name: Ensure nginx is running
      service:
        name: nginx
        state: started

    - name: Build Go engine
      shell: |
        cd {{ project_root }}/engine && go build -o salem .
      environment:
        GOPATH: /root/go
        PATH: "/usr/local/go/bin:/root/go/bin:{{ ansible_env.PATH }}"

    - name: Check if engine is already running
      shell: pgrep -f "salem" || true
      register: engine_running
      changed_when: false

    - name: Start engine
      shell: |
        set -a && . /etc/salem-1692/env && set +a && cd {{ project_root }}/engine && nohup ./salem > /tmp/salem-engine.log 2>&1 &
      become_user: "{{ app_user }}"
      when: engine_running.stdout == ""

    - name: Check if village dev server is already running
      shell: pgrep -f "vite.*village" || true
      register: village_running
      changed_when: false

    - name: Start village dev server
      shell: |
        cd {{ project_root }}/clients/village && nohup npx vite --port=4300 --host=0.0.0.0 > /tmp/village-dev.log 2>&1 &
      become_user: "{{ app_user }}"
      when: village_running.stdout == ""

    - name: Wait for engine to be ready
      uri:
        url: "http://localhost:{{ engine_port }}/api/settings/public"
        status_code: [200]
      register: engine_result
      until: engine_result is not failed
      retries: 10
      delay: 2
      ignore_errors: yes

    - name: Wait for village dev server to be ready
      uri:
        url: "http://localhost:4300"
        status_code: [200]
      register: village_result
      until: village_result is not failed
      retries: 15
      delay: 3
      ignore_errors: yes

    - name: Display dev server status
      debug:
        msg: |
          Development servers:

          ZBBS API:     http://{{ server_name }}/api
          Village:      http://localhost:4300

          Engine direct:   http://localhost:{{ engine_port }}
