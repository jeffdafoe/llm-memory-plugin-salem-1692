---
- name: Deploy Salem 1692
  hosts: all
  become: yes
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Load secrets
      include_tasks: ../tasks/load-secrets.yml

  tasks:
    - name: Display deployment info
      debug:
        msg: "Deploying to {{ deploy_environment }} environment"

    # Git pull is handled by deploy.sh before Ansible runs.
    # Ansible just syncs from repo_root (/opt/zbbs) to project_root (/var/www/zbbs).

    - name: Create deployment directory
      file:
        path: "{{ project_root }}"
        state: directory
        owner: "{{ app_user }}"
        mode: "0755"
      when: repo_root != project_root

    - name: Deploy application code
      synchronize:
        src: "{{ repo_root }}/{{ item }}/"
        dest: "{{ project_root }}/{{ item }}/"
        delete: yes
      delegate_to: "{{ inventory_hostname }}"
      loop:
        - engine
        - client
        - migrations
      when: repo_root != project_root

    - name: Set ownership on deployed code
      file:
        path: "{{ project_root }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: yes
      when: repo_root != project_root

    # Go engine build. Built to salem.new, a STAGING name — NOT engine/salem,
    # which is what the unit's ExecStart runs. The new binary is promoted into
    # place ("Install the new engine binary") only after every migration has
    # applied for real, below. So a failed migration aborts the play with the OLD
    # binary still installed, and starting the service gives a consistent
    # old-code/old-schema state rather than the LLM-493 split state (new binary,
    # un-migrated schema: the village came up price-blind and every checkpoint
    # failed on a missing column). LLM-495.
    - name: Build Go engine
      shell: |
        cd {{ project_root }}/engine && go build -o salem.new ./sim/cmd/engine
      environment:
        GOPATH: /root/go
        PATH: "/usr/local/go/bin:/root/go/bin:{{ ansible_env.PATH }}"

    # Environment file
    - name: Create env directory
      file:
        path: /etc/salem-1692
        state: directory
        mode: "0750"

    - name: Deploy environment file
      template:
        src: ../templates/salem-env.j2
        dest: /etc/salem-1692/env
        mode: "0640"
        owner: root
        group: "{{ app_user }}"

    # Stop the engine before migrations run. village_object, actor, structure,
    # scene, huddle, order and environment rows are held in memory by the running
    # engine and written back to Postgres by its periodic/shutdown SaveWorld
    # checkpoint (engine/sim/repo/pg/save_world.go). A migration that UPDATEs one
    # of those rows while the engine is live is silently reverted: the old
    # binary's next checkpoint upserts its stale in-memory copy back over the
    # migrated value (LLM-73, surfaced live by LLM-60). Stopping first means
    # migrations apply to a quiesced database. Skipped on a fresh machine where
    # the unit does not exist yet; nothing is running to clobber.
    #
    # The stop is a GRACEFUL one (SIGWINCH, LLM-404): the engine checkpoints while
    # still fully live and REFUSES to exit if that write fails, rather than dying
    # and rebooting the village onto a stale checkpoint — the 2026-07-12 outage
    # silently rolled back ~17.5 hours of world state exactly that way. A refused
    # stop must therefore FAIL THE DEPLOY here, before the migrations below touch
    # the database, leaving the engine running and the village intact.
    #
    # Delivered with `systemctl kill`, NOT `systemctl stop`, and that is
    # load-bearing: systemd always escalates a stop to SIGKILL once
    # TimeoutStopSec expires, and a SIGKILL landing on an engine that is
    # deliberately refusing to exit would destroy the very world the refusal is
    # protecting. `systemctl kill` just delivers the signal — the unit never
    # enters its stopping state, so nothing is on a timer. (`systemctl stop`
    # still works, and still means force/accept-the-loss. That is the escape
    # hatch when durability cannot be repaired and the process must come down.)
    - name: Check whether the salem-engine unit is installed
      stat:
        path: /etc/systemd/system/salem-engine.service
      register: salem_engine_unit

    - name: Check whether the engine is currently running
      command: systemctl is-active --quiet salem-engine
      register: engine_was_running
      failed_when: false
      changed_when: false
      when: salem_engine_unit.stat.exists

    # --- Pre-stop migration dry run (LLM-495) ---------------------------------
    # Dry-run every pending migration against the LIVE database, BEFORE the engine
    # stop below, so a migration whose guard RAISEs (or errors any other way) fails
    # the deploy HERE — while the village is still serving — instead of after the
    # stop, which is what left the LLM-493 deploy with the engine down, the schema
    # un-migrated, and the new binary already installed.
    #
    # This block is READ-ONLY and self-contained. It runs ONLY when the engine is
    # actually running (the same guard the stop uses), which means it never writes
    # to a live database and never needs the fresh-machine baseline path:
    # migrations_applied is guaranteed to exist because the engine could not have
    # started without its schema. The authoritative planning + apply below are
    # left exactly as they were and still run on the quiesced database after the
    # stop. The pending-list logic here MIRRORS "Determine pending migrations"
    # below and must be kept in sync with it; because no migration is recorded
    # between here and there, the two computations yield the same list.
    - name: Find all SQL migrations (dry run)
      find:
        paths: "{{ project_root }}/migrations"
        patterns: "*_up.sql"
      register: dryrun_migration_files
      when:
        - run_migrations | default(false) | bool
        - (engine_was_running | default({})).rc | default(1) == 0

    - name: Check which migrations have been applied (dry run)
      shell: |
        sudo -u postgres psql -d {{ database_name }} -t -A -c "SELECT migration_name FROM migrations_applied;"
      register: dryrun_applied
      changed_when: false
      when:
        - run_migrations | default(false) | bool
        - (engine_was_running | default({})).rc | default(1) == 0

    - name: Determine pending migrations to dry-run
      set_fact:
        dryrun_pending: "{{ dryrun_migration_files.files | sort(attribute='path') | rejectattr('path', 'search', '(' + (dryrun_applied.stdout_lines | map('regex_escape') | join('|')) + ')') | list if (dryrun_applied.stdout_lines | default([])) | length > 0 else (dryrun_migration_files.files | default([])) | sort(attribute='path') }}"
      when:
        - run_migrations | default(false) | bool
        - (engine_was_running | default({})).rc | default(1) == 0

    # Each migration file is a single BEGIN;/COMMIT; transaction with the
    # terminators alone on their lines (asserted per-file below). Swapping the
    # terminating COMMIT for ROLLBACK runs the REAL migration — DDL, backfill,
    # RAISE guards, constraints — inside a transaction that is then discarded.
    # Postgres has transactional DDL, so ALTER TABLE / ADD CONSTRAINT and
    # CREATE TEMP TABLE ... ON COMMIT DROP all roll back cleanly, and every RAISE
    # fires exactly as it would for the real apply.
    #
    # The per-file BEGIN/COMMIT assertion is load-bearing: without a single COMMIT
    # line to swap, the "dry" run would COMMIT for real against the live database.
    # So a file that does not fit the shape FAILS the deploy rather than running —
    # the ticket's "a non-transactional migration needs an explicit opt-out"
    # caveat, enforced fail-closed. CREATE INDEX CONCURRENTLY / VACUUM cannot live
    # inside a BEGIN/COMMIT file, so such a migration trips this guard and a human
    # decides how to handle it.
    #
    # lock_timeout/statement_timeout bound the blast radius: the dry run takes the
    # same locks the real migration would, and a large backfill UPDATE would hold
    # row locks against the live engine's writes. Capping them means the dry run
    # fails fast instead of ever wedging production. NOTE: nextval does NOT roll
    # back, so a future migration using a sequence would burn ids on each dry run.
    - name: Dry-run pending migrations against the live database
      shell: |
        migration="{{ item.path }}"
        begins=$(grep -c '^BEGIN;$' "$migration")
        commits=$(grep -c '^COMMIT;$' "$migration")
        if [ "$begins" != "1" ] || [ "$commits" != "1" ]; then
            echo "cannot safely dry-run $(basename "$migration"): not a single BEGIN;/COMMIT; transaction (found $begins BEGIN line(s), $commits COMMIT line(s)). A non-transactional migration needs an explicit opt-out here before it can deploy." >&2
            exit 1
        fi
        sed 's/^COMMIT;$/ROLLBACK;/' "$migration" \
          | sudo -u postgres psql -d {{ database_name }} -v ON_ERROR_STOP=1 \
              -c "SET lock_timeout = '5s'; SET statement_timeout = '60s';" -f -
      loop: "{{ dryrun_pending | default([]) }}"
      loop_control:
        label: "{{ item.path | basename }}"
      changed_when: false
      when:
        - run_migrations | default(false) | bool
        - (engine_was_running | default({})).rc | default(1) == 0
    # --- end pre-stop migration dry run ---------------------------------------

    # Journal CURSOR (not a timestamp) for this stop attempt, so every check below
    # reads only THIS shutdown's lines. journalctl --since has one-second
    # resolution, which is not enough to guarantee a previous attempt's "ABORTED"
    # or summary line can't be misread as this one's — and the deploy branches on
    # exactly those lines.
    - name: Mark the journal position before stopping the engine
      shell: |
        journalctl -u salem-engine -n 0 --show-cursor --no-pager \
          | sed -n 's/^-- cursor: //p'
      register: engine_journal_cursor
      changed_when: false
      when: (engine_was_running | default({})).rc | default(1) == 0

    # The cursor is REQUIRED, not nice-to-have: without it we cannot scope the
    # journal reads to this stop attempt, and the play's refusal detection would
    # silently degrade into "wait the full timeout and guess". A running unit
    # always has journal entries, so an empty cursor means journald itself is
    # unhealthy — fail now, before we have signalled anything.
    - name: Fail if the journal cursor could not be read
      fail:
        msg: |
          Could not read a journal cursor for salem-engine, so this deploy cannot
          reliably tell a refused stop from a successful one. The engine has NOT
          been signalled and nothing has been migrated.

          Check journald: journalctl -u salem-engine -n 5
      when:
        - (engine_was_running | default({})).rc | default(1) == 0
        - (engine_journal_cursor | default({})).stdout | default('') == ''

    - name: Request a graceful engine stop (SIGWINCH — refuses to exit unsaved, LLM-404)
      command: systemctl kill -s WINCH salem-engine
      when: (engine_was_running | default({})).rc | default(1) == 0

    # Four ways out, and they are deliberately NOT collapsed into "did it exit?":
    #   0  inactive          — the stop went through and the world is saved
    #   1  refused           — the engine logged its abort; caught immediately
    #                          rather than sitting out the whole timeout
    #   3  failed            — the unit died abnormally. NOT the same as a clean
    #                          stop, and must not be reported as one
    #   2  timed out         — still running, no refusal logged: wedged
    # A legitimate stop can take a while (draining an in-flight NPC tick, then two
    # checkpoints), hence the generous window.
    - name: Wait for the engine to checkpoint and exit
      shell: |
        cursor="{{ (engine_journal_cursor | default({})).stdout | default('') }}"
        for _ in $(seq 1 60); do
          state="$(systemctl is-active salem-engine || true)"
          case "$state" in
            inactive)  exit 0 ;;
            failed)    exit 3 ;;
          esac
          if [ -n "$cursor" ] && journalctl -u salem-engine --after-cursor "$cursor" --no-pager -o cat \
               | grep -qF 'graceful stop ABORTED'; then
            exit 1
          fi
          sleep 5
        done
        exit 2
      register: engine_stopped
      failed_when: false
      changed_when: false
      when: (engine_was_running | default({})).rc | default(1) == 0

    - name: Read the engine's account of the shutdown
      shell: |
        journalctl -u salem-engine --after-cursor "{{ (engine_journal_cursor | default({})).stdout | default('') }}" \
          --no-pager -o cat | grep -F 'engine: shutdown summary:' | tail -1
      register: engine_shutdown_summary
      failed_when: false
      changed_when: false
      when: (engine_was_running | default({})).rc | default(1) == 0

    # A REFUSED stop is a failed deploy, and it fails HERE — before the migrations
    # below touch the database. The village is still running and has lost nothing.
    - name: Fail the deploy if the engine would not stop
      fail:
        msg: |
          {% if (engine_stopped | default({})).rc == 1 %}
          The engine REFUSED to stop. Its checkpoint is failing, so exiting would
          discard every change since the last good checkpoint — which is exactly
          how the 2026-07-12 outage silently rolled the village back 17.5 hours.

          Nothing has been migrated. The village is still running, unharmed.

          Repair durability, then re-run this deploy. Check:
            curl .../api/village/umbilical/checkpoint-health
          To bring it down anyway and ACCEPT THE LOSS:
            systemctl stop salem-engine
          {% else %}
          The engine did not exit within 5 minutes of a graceful stop request, and
          logged no refusal — so it is not protecting itself, it is stuck. (If this
          engine predates LLM-404 it has no SIGWINCH handler and ignored the signal
          entirely; stop it once by hand with `systemctl stop salem-engine` and
          re-run.) Nothing has been migrated.

          Investigate: journalctl -u salem-engine -n 100
          {% endif %}
      when:
        - (engine_was_running | default({})).rc | default(1) == 0
        - (engine_stopped | default({})).rc | default(0) in [1, 2]

    # The engine is DOWN now, one way or another. Before we run migrations —
    # which are IRREVERSIBLE — insist we know how it went down.
    #
    # "Clean" means this shutdown durably saved the world at least once: either
    # `final=ok`, or `gate=ok` (a graceful stop whose gate wrote a good checkpoint
    # seconds before a transient final write failed — the village is safe and the
    # DB is current). Anything else — a crash (rc=3), no summary at all, or a force
    # stop whose only checkpoint failed — means we do NOT know what state the
    # database is in relative to the world that just died.
    #
    # Halting here is NOT about recovering the lost in-memory state; that is gone
    # and no amount of stopping brings it back. It is about the migration boundary:
    # migrations are irreversible, and running them automatically on top of an
    # uncontrolled engine death compounds a transient failure into a mixed event
    # (lost checkpoint + migrated schema + new binary) and destroys the operator's
    # chance to inspect or snapshot the DB at the exact pre-migration state. That
    # is a call a human should make, so this asks them to make it.
    #
    # Scoped to run_migrations: with no migrations pending, nothing irreversible is
    # about to happen, so there is no boundary to defend and the play just brings
    # the village back up.
    - name: Fail before migrations if the engine died without a confirmed checkpoint
      fail:
        msg: |
          The engine went down WITHOUT confirming it saved the world, and there are
          migrations to run. Migrations are irreversible, so this deploy is stopping
          here rather than layering schema changes on top of a state nobody has
          looked at.

            stop result: {{ (engine_stopped | default({})).rc | default('unknown') }}{{ ' (unit ended in `failed` — the engine crashed)' if (engine_stopped | default({})).rc | default(0) | int == 3 else '' }}
            engine said: {{ (engine_shutdown_summary | default({})).stdout | default('(no shutdown summary in the journal)') }}

          Nothing has been migrated. The engine is stopped.

          Inspect the journal and the database, take a snapshot if you want one,
          then re-run with:
            -e allow_migrate_after_unclean_engine_stop=true
        # A deploy with no migrations pending has no irreversible step to guard.
      when:
        - (engine_was_running | default({})).rc | default(1) == 0
        - run_migrations | default(false) | bool
        - not (allow_migrate_after_unclean_engine_stop | default(false) | bool)
        - "'final=ok' not in ((engine_shutdown_summary | default({})).stdout | default(''))"
        - "'gate=ok' not in ((engine_shutdown_summary | default({})).stdout | default(''))"

    # Migrations
    # On a fresh database, load the schema baseline (schema.sql) before running
    # migrations. The migration runner below assumes migrations_applied already
    # exists; schema.sql creates it (empty) along with all baseline tables. On an
    # existing database that table is present, so this is skipped entirely.
    - name: Check whether the schema baseline has been applied
      shell: |
        sudo -u postgres psql -d {{ database_name }} -tAc "SELECT to_regclass('public.migrations_applied') IS NOT NULL;"
      register: baseline_present
      changed_when: false

    - name: Load schema baseline on a fresh database
      shell: |
        sudo -u postgres psql -d {{ database_name }} -v ON_ERROR_STOP=1 -f "{{ project_root }}/migrations/schema.sql"
      when:
        - run_migrations | default(false) | bool
        - baseline_present.stdout | trim != 't'

    - name: Find all SQL migrations
      find:
        paths: "{{ project_root }}/migrations"
        patterns: "*_up.sql"
      register: migration_files

    - name: Check which migrations have been applied
      shell: |
        sudo -u postgres psql -d {{ database_name }} -t -A -c "SELECT migration_name FROM migrations_applied;"
      register: applied_migrations
      changed_when: false

    - name: Set applied migrations list
      set_fact:
        applied_list: "{{ applied_migrations.stdout_lines | default([]) }}"

    - name: Determine pending migrations
      set_fact:
        pending_migrations: "{{ migration_files.files | sort(attribute='path') | rejectattr('path', 'search', '(' + (applied_list | map('regex_escape') | join('|')) + ')') | list if applied_list | length > 0 else migration_files.files | sort(attribute='path') }}"

    - name: Display migration status
      debug:
        msg: "Migrations: {{ migration_files.files | length }} total, {{ applied_list | length }} applied, {{ pending_migrations | length }} pending"

    # ON_ERROR_STOP=1 makes psql exit non-zero on the first SQL error.
    # Without it, psql swallows errors inside BEGIN/COMMIT blocks and
    # exits 0 anyway, so the && chain still records the migration as
    # applied even when its SQL rolled back. ZBBS-119 hit this when its
    # description strings overflowed setting.description varchar(255).
    - name: Run pending SQL migrations
      shell: |
        sudo -u postgres psql -d {{ database_name }} -v ON_ERROR_STOP=1 -f "{{ item.path }}" && \
        sudo -u postgres psql -d {{ database_name }} -v ON_ERROR_STOP=1 -c "INSERT INTO migrations_applied (migration_name) VALUES ('{{ item.path | basename | replace('_up.sql', '') }}');"
      loop: "{{ pending_migrations }}"
      loop_control:
        label: "{{ item.path | basename }}"
      when: run_migrations | default(false) | bool

    # Promote the freshly-built binary into place NOW — only after every migration
    # has applied for real. The build wrote engine/salem.new (staging); this moves
    # it onto engine/salem, which ExecStart runs. mv on the same filesystem is an
    # atomic rename, so there is no window where salem is half-written, and it
    # fails loudly if salem.new is somehow missing rather than promoting nothing.
    # The only task that syncs engine/ (with delete) runs far above, before the
    # build, so nothing can remove the staged binary between build and this move.
    # A failed migration aborts the play before this task, leaving the OLD binary
    # in place for a clean old-code/old-schema abort instead of the LLM-493 split
    # state. Unconditional (not gated on run_migrations): a run that skips
    # migrations must still install the code it just built.
    - name: Install the new engine binary (staged during build, promoted after migrations)
      command: mv "{{ project_root }}/engine/salem.new" "{{ project_root }}/engine/salem"

    # Bring the engine back up immediately after migrations. The new binary was
    # installed just above and the schema is now migrated, so it boots clean. This
    # block sits here rather than at the end of the play to cap engine downtime at
    # the stop-checkpoint + migration window; nothing below (client tileset copy,
    # Godot export, nginx) needs the engine down. A failed migration aborts the
    # play before this task, so the engine deliberately stays down until the
    # migration is fixed and the deploy re-run, rather than booting onto a
    # half-migrated schema (LLM-73).
    - name: Deploy systemd service
      template:
        src: ../templates/salem-engine.service.j2
        dest: /etc/systemd/system/salem-engine.service
      register: service_file

    - name: Reload systemd
      systemd:
        daemon_reload: yes
      when: service_file.changed

    - name: Enable and restart engine
      systemd:
        name: salem-engine
        enabled: yes
        state: restarted

    # Copy persistent commercial tilesets into client project before Godot export.
    # These files are gitignored and deployed manually via scp.
    # The Godot export packs them into the .pck file.
    - name: Copy commercial tilesets into client for Godot export
      synchronize:
        src: "{{ project_root }}/tilesets/"
        dest: "{{ project_root }}/client/assets/tilesets/"
        rsync_opts:
          - "--ignore-existing"
      delegate_to: "{{ inventory_hostname }}"

    # Godot client export
    - name: Create client dist directory
      file:
        path: "{{ project_root }}/client/dist"
        state: directory
        owner: "{{ app_user }}"
        mode: "0755"

    - name: Export Godot client for web
      command: >
        {{ godot_bin }} --headless --path {{ project_root }}/client
        --export-release "Web" dist/index.html
      environment:
        GODOT_SILENCE_ROOT_WARNING: "1"
      when: deploy_environment == 'production'

    # Sync repo tilesets to persistent tilesets directory (no --delete so purchased assets survive)
    - name: Create persistent tilesets directory
      file:
        path: "{{ project_root }}/tilesets"
        state: directory
        owner: "{{ app_user }}"
        mode: "0755"

    - name: Sync free tilesets to persistent location
      synchronize:
        src: "{{ project_root }}/client/assets/tilesets/"
        dest: "{{ project_root }}/tilesets/"
        rsync_opts:
          - "--exclude=mana-seed/"
      delegate_to: "{{ inventory_hostname }}"

    # Nginx
    - name: Deploy nginx site configuration
      template:
        src: "../roles/nginx/templates/{{ 'site-development.conf.j2' if deploy_environment == 'development' else 'site-production.conf.j2' }}"
        dest: "/etc/nginx/sites-available/{{ project_name }}.conf"

    - name: Enable nginx site
      file:
        src: "/etc/nginx/sites-available/{{ project_name }}.conf"
        dest: "/etc/nginx/sites-enabled/{{ project_name }}.conf"
        state: link

    - name: Deploy village nginx configuration
      template:
        src: "../roles/nginx/templates/site-village.conf.j2"
        dest: "/etc/nginx/sites-available/{{ village_server_name }}.conf"
      when: village_server_name is defined

    - name: Enable village nginx site
      file:
        src: "/etc/nginx/sites-available/{{ village_server_name }}.conf"
        dest: "/etc/nginx/sites-enabled/{{ village_server_name }}.conf"
        state: link
        force: yes
      when: village_server_name is defined

    - name: Reload nginx
      service:
        name: nginx
        state: reloaded

    - name: Display deployment complete message
      debug:
        msg: "Deploy complete! Environment: {{ deploy_environment }}, Branch: {{ deploy_branch | default('main') }}"

    # What the stop actually cost (LLM-404). A deploy that discarded hours of
    # village must not read like a clean one, so the engine's own shutdown-summary
    # line is echoed here, after "deploy complete", where it is the last thing on
    # screen. Every branch below states what IS known — none of them quietly
    # implies a checkpoint was verified when it wasn't.
    - name: Report what the engine shutdown cost
      vars:
        was_running: "{{ (engine_was_running | default({})).rc | default(1) == 0 }}"
        stop_rc: "{{ (engine_stopped | default({})).rc | default(0) }}"
        summary: "{{ (engine_shutdown_summary | default({})).stdout | default('') }}"
      debug:
        msg: >-
          {% if not was_running %}
          WORLD STATE: the engine was NOT running when this deploy started, so this
          deploy did not stop it and cannot vouch for its last checkpoint. Whatever
          it boots with is whatever that checkpoint held.
          {% elif stop_rc | int == 3 %}
          *** WORLD STATE: THE ENGINE CRASHED rather than checkpointing its way out
          (the unit ended in `failed`). Everything since its last successful
          checkpoint is GONE, and this deploy cannot say how much that was. ***
          {{ summary }}
          Investigate: journalctl -u salem-engine -n 100
          {% elif summary == '' %}
          WORLD STATE: the engine stopped, but logged no shutdown summary, so this
          deploy cannot confirm a checkpoint was written. Check:
          journalctl -u salem-engine -n 100
          {% elif 'final=ok' in summary %}
          WORLD STATE: stopped cleanly, final checkpoint written, nothing lost.
          {{ summary }}
          {% elif 'gate=ok' in summary %}
          WORLD STATE: saved, then the final write failed on the way out. The stop
          gate had already checkpointed the world seconds earlier, so the village is
          intact and only that last sliver is gone — but the final failure means
          durability is flaky and wants looking at.
          {{ summary }}
          {% else %}
          *** WORLD STATE: THE ENGINE EXITED WITHOUT SAVING THE WORLD AT ALL. The
          village has been rolled back to its last successful checkpoint and
          everything since then is GONE. ***
          {{ summary }}
          {% endif %}
