---
- name: Deploy ZBBS application
  hosts: all
  become: yes
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Load secrets
      include_tasks: ../tasks/load-secrets.yml

  tasks:
    - name: Display deployment info
      debug:
        msg: "Deploying to {{ deploy_environment }} environment"

    # Git pull is handled by deploy.sh before Ansible runs.
    # Ansible just syncs from repo_root (/opt/zbbs) to project_root (/var/www/zbbs).

    - name: Create deployment directory
      file:
        path: "{{ project_root }}"
        state: directory
        owner: "{{ app_user }}"
        mode: "0755"
      when: repo_root != project_root

    - name: Deploy application code
      synchronize:
        src: "{{ repo_root }}/{{ item }}/"
        dest: "{{ project_root }}/{{ item }}/"
        delete: yes
      delegate_to: "{{ inventory_hostname }}"
      loop:
        - engine
        - clients
        - migrations
      when: repo_root != project_root

    # Go engine build
    - name: Build Go engine
      shell: |
        cd {{ project_root }}/engine && go build -o zbbs .
      environment:
        GOPATH: /root/go
        PATH: "/usr/local/go/bin:/root/go/bin:{{ ansible_env.PATH }}"

    # JWT keypair (unencrypted — Go reads the PEM directly)
    - name: Create JWT key directory
      file:
        path: "{{ project_root }}/engine/jwt"
        state: directory
        owner: "{{ app_user }}"
        mode: "0700"

    - name: Generate JWT private key
      command: >
        openssl genpkey -out {{ project_root }}/engine/jwt/private.pem
        -algorithm rsa -pkeyopt rsa_keygen_bits:4096
      args:
        creates: "{{ project_root }}/engine/jwt/private.pem"

    - name: Set JWT private key permissions
      file:
        path: "{{ project_root }}/engine/jwt/private.pem"
        owner: "{{ app_user }}"
        mode: "0600"

    - name: Extract JWT public key
      command: >
        openssl pkey -in {{ project_root }}/engine/jwt/private.pem
        -out {{ project_root }}/engine/jwt/public.pem -pubout
      args:
        creates: "{{ project_root }}/engine/jwt/public.pem"

    - name: Set JWT public key permissions
      file:
        path: "{{ project_root }}/engine/jwt/public.pem"
        owner: "{{ app_user }}"
        mode: "0644"

    # Environment file
    - name: Create env directory
      file:
        path: /etc/zbbs
        state: directory
        mode: "0750"

    - name: Deploy environment file
      template:
        src: ../templates/zbbs-env.j2
        dest: /etc/zbbs/env
        mode: "0640"
        owner: root
        group: "{{ app_user }}"

    # Migrations
    - name: Find all SQL migrations
      find:
        paths: "{{ project_root }}/migrations"
        patterns: "*_up.sql"
      register: migration_files

    - name: Check which migrations have been applied
      shell: |
        sudo -u postgres psql -d {{ database_name }} -t -A -c "SELECT migration_id FROM migrations_applied;"
      register: applied_migrations
      changed_when: false

    - name: Set applied migrations list
      set_fact:
        applied_list: "{{ applied_migrations.stdout_lines | default([]) }}"

    - name: Determine pending migrations
      set_fact:
        pending_migrations: "{{ migration_files.files | sort(attribute='path') | rejectattr('path', 'search', '(' + (applied_list | map('regex_escape') | join('|')) + ')') | list if applied_list | length > 0 else migration_files.files | sort(attribute='path') }}"

    - name: Display migration status
      debug:
        msg: "Migrations: {{ migration_files.files | length }} total, {{ applied_list | length }} applied, {{ pending_migrations | length }} pending"

    - name: Run pending SQL migrations
      shell: |
        sudo -u postgres psql -d {{ database_name }} -f "{{ item.path }}" && \
        sudo -u postgres psql -d {{ database_name }} -c "INSERT INTO migrations_applied (migration_id) VALUES ('{{ item.path | basename | replace('_up.sql', '') }}');"
      loop: "{{ pending_migrations }}"
      loop_control:
        label: "{{ item.path | basename }}"
      when: run_migrations | default(false) | bool

    # Village client build
    - name: Install village client npm dependencies
      npm:
        path: "{{ project_root }}/clients/village"
        state: present
      become_user: "{{ app_user }}"

    - name: Build village client for production
      command: npx vite build
      args:
        chdir: "{{ project_root }}/clients/village"
      when: deploy_environment == 'production'
      become_user: "{{ app_user }}"

    # Systemd service
    - name: Deploy systemd service
      template:
        src: ../templates/zbbs-engine.service.j2
        dest: /etc/systemd/system/zbbs-engine.service
      register: service_file

    - name: Reload systemd
      systemd:
        daemon_reload: yes
      when: service_file.changed

    - name: Enable and restart engine
      systemd:
        name: zbbs-engine
        enabled: yes
        state: restarted

    # Nginx
    - name: Deploy nginx site configuration
      template:
        src: "../roles/nginx/templates/{{ 'site-development.conf.j2' if deploy_environment == 'development' else 'site-production.conf.j2' }}"
        dest: "/etc/nginx/sites-available/{{ project_name }}.conf"

    - name: Enable nginx site
      file:
        src: "/etc/nginx/sites-available/{{ project_name }}.conf"
        dest: "/etc/nginx/sites-enabled/{{ project_name }}.conf"
        state: link

    - name: Reload nginx
      service:
        name: nginx
        state: reloaded

    - name: Display deployment complete message
      debug:
        msg: "Deploy complete! Environment: {{ deploy_environment }}, Branch: {{ deploy_branch | default('main') }}"
