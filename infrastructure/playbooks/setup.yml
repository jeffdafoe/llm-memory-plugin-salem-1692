---
- name: Set up Salem 1692 environment
  hosts: all
  become: yes
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Load secrets
      include_tasks: ../tasks/load-secrets.yml
      when: deploy_environment == 'development'

    - name: Display environment
      debug:
        msg: "Setting up {{ deploy_environment }} environment on {{ inventory_hostname }}"

  roles:
    - role: ../roles/common
    - role: ../roles/postgresql
    - role: ../roles/godot
    - role: ../roles/nginx

  post_tasks:
    - name: Install Go (if not present)
      shell: |
        if ! command -v go &> /dev/null; then
          curl -sL https://go.dev/dl/go1.23.6.linux-amd64.tar.gz | tar -C /usr/local -xzf -
        fi
      args:
        creates: /usr/local/go/bin/go

    - name: Add Go to system PATH
      copy:
        content: 'export PATH=$PATH:/usr/local/go/bin'
        dest: /etc/profile.d/golang.sh
        mode: '0644'

    - name: Check hosts file for development entry
      shell: grep -q "{{ server_name }}" /mnt/c/Windows/System32/drivers/etc/hosts
      register: hosts_check
      changed_when: false
      failed_when: false
      when: deploy_environment == 'development'

    - name: Remind to add hosts file entry
      debug:
        msg: "Add this line to C:\\Windows\\System32\\drivers\\etc\\hosts: 127.0.0.1 {{ server_name }}"
      when: deploy_environment == 'development' and hosts_check.rc != 0

    - name: Display setup complete
      debug:
        msg: >-
          Setup complete!
          Environment: {{ deploy_environment }},
          Project root: {{ project_root }},
          Go: 1.23,
          PostgreSQL: {{ postgresql_version }},
          Node.js: {{ nodejs_version }},
          Database: {{ database_name }} / {{ database_user }}.
          Next step: Run deploy.yml to build and deploy.
