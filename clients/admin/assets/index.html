<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZBBS — Asset Reference</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a10;
            color: #d4c5a0;
            font-family: Georgia, "Times New Roman", serif;
            padding: 24px;
        }

        h1 {
            font-size: 20px;
            color: #c8b87a;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 13px;
            color: #8a7a50;
            margin-bottom: 24px;
        }

        .stats {
            font-size: 12px;
            color: #6a6a50;
            margin-bottom: 20px;
        }

        /* Category sections */
        .category {
            margin-bottom: 32px;
        }

        .category-header {
            font-size: 14px;
            color: #c8b87a;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid #3a3a20;
            padding-bottom: 6px;
            margin-bottom: 12px;
        }

        /* Asset cards */
        .asset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .asset-card {
            background: #222218;
            border: 1px solid #3a3a20;
            border-radius: 4px;
            padding: 12px;
        }

        .asset-name {
            font-size: 14px;
            color: #d4c5a0;
            margin-bottom: 2px;
        }

        .asset-id {
            font-size: 11px;
            color: #6a6a50;
            font-family: 'Courier New', monospace;
            margin-bottom: 8px;
        }

        .asset-meta {
            font-size: 11px;
            color: #8a7a50;
            margin-bottom: 8px;
        }

        .asset-meta span {
            margin-right: 12px;
        }

        /* State sprites */
        .states {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .state canvas {
            background: #151510;
            border: 1px solid #2a2a1a;
            border-radius: 3px;
            image-rendering: pixelated;
        }

        .state-label {
            font-size: 10px;
            color: #8a7a50;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .state-default .state-label {
            color: #a09070;
            font-weight: bold;
        }

        /* Loading / error states */
        .loading {
            text-align: center;
            padding: 40px;
            color: #8a7a50;
            font-style: italic;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #d49090;
        }
    </style>
</head>
<body>
    <h1>Asset Reference</h1>
    <div class="subtitle">All available village objects and their visual states</div>
    <div class="stats" id="stats"></div>
    <div id="content">
        <div class="loading">Loading assets...</div>
    </div>

    <script>
        // Thumbnail size — sprites are rendered at 2x native for readability
        const THUMB_SCALE = 2;
        const MAX_THUMB = 96; // max canvas dimension

        // Cache loaded sprite sheet images
        const sheetCache = {};

        function loadSheet(src) {
            if (sheetCache[src]) return sheetCache[src];
            const img = new Image();
            img.src = src;
            sheetCache[src] = img;
            return img;
        }

        // Draw a sprite state onto a canvas element
        function drawState(canvas, state) {
            const img = loadSheet(state.sheet);

            // Scale to fit within MAX_THUMB while keeping aspect ratio
            const scale = Math.min(
                THUMB_SCALE,
                MAX_THUMB / state.src_w,
                MAX_THUMB / state.src_h
            );
            const w = Math.round(state.src_w * scale);
            const h = Math.round(state.src_h * scale);
            canvas.width = w;
            canvas.height = h;

            const ctx = canvas.getContext("2d");
            ctx.imageSmoothingEnabled = false;

            function draw() {
                ctx.clearRect(0, 0, w, h);
                ctx.drawImage(img,
                    state.src_x, state.src_y, state.src_w, state.src_h,
                    0, 0, w, h
                );
            }

            if (img.complete && img.naturalWidth > 0) {
                draw();
            } else {
                img.addEventListener("load", draw);
            }
        }

        // Build the reference sheet from API data
        function renderAssets(assets) {
            const content = document.getElementById("content");
            const stats = document.getElementById("stats");

            // Count totals
            let totalStates = 0;
            for (const asset of assets) {
                totalStates += asset.states.length;
            }
            stats.textContent = `${assets.length} assets, ${totalStates} states`;

            // Group by category
            const categories = {};
            const categoryOrder = ["tree", "nature", "structure", "prop"];
            const categoryLabels = {
                tree: "Trees",
                nature: "Nature",
                structure: "Structures",
                prop: "Props"
            };

            for (const asset of assets) {
                if (!categories[asset.category]) {
                    categories[asset.category] = [];
                }
                categories[asset.category].push(asset);
            }

            content.innerHTML = "";

            for (const catId of categoryOrder) {
                const catAssets = categories[catId];
                if (!catAssets || catAssets.length === 0) continue;

                const section = document.createElement("div");
                section.className = "category";

                const header = document.createElement("div");
                header.className = "category-header";
                header.textContent = categoryLabels[catId] || catId;
                section.appendChild(header);

                const grid = document.createElement("div");
                grid.className = "asset-grid";

                for (const asset of catAssets) {
                    const card = document.createElement("div");
                    card.className = "asset-card";

                    const name = document.createElement("div");
                    name.className = "asset-name";
                    name.textContent = asset.name;
                    card.appendChild(name);

                    const id = document.createElement("div");
                    id.className = "asset-id";
                    id.textContent = asset.id;
                    card.appendChild(id);

                    const meta = document.createElement("div");
                    meta.className = "asset-meta";
                    meta.innerHTML = `<span>layer: ${asset.layer}</span>` +
                        `<span>anchor: (${asset.anchor_x}, ${asset.anchor_y})</span>` +
                        `<span>states: ${asset.states.length}</span>`;
                    card.appendChild(meta);

                    const statesEl = document.createElement("div");
                    statesEl.className = "states";

                    for (const state of asset.states) {
                        const stateEl = document.createElement("div");
                        stateEl.className = "state";
                        if (state.state === asset.default_state) {
                            stateEl.classList.add("state-default");
                        }

                        const canvas = document.createElement("canvas");
                        drawState(canvas, state);
                        stateEl.appendChild(canvas);

                        const label = document.createElement("div");
                        label.className = "state-label";
                        label.textContent = state.state;
                        stateEl.appendChild(label);

                        statesEl.appendChild(stateEl);
                    }

                    card.appendChild(statesEl);
                    grid.appendChild(card);
                }

                section.appendChild(grid);
                content.appendChild(section);
            }

            // Any categories not in the predefined order
            for (const catId of Object.keys(categories)) {
                if (!categoryOrder.includes(catId)) {
                    // Would render here, but unlikely with current data
                }
            }
        }

        // Fetch and render
        fetch("/api/assets")
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            })
            .then(renderAssets)
            .catch(err => {
                document.getElementById("content").innerHTML =
                    `<div class="error">Failed to load assets: ${err.message}</div>`;
            });
    </script>
</body>
</html>
