<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZBBS Village</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Georgia, "Times New Roman", serif;
            color: #d4c5a0;
        }
        canvas {
            display: block;
        }
        #app {
            width: 100%;
            height: 100%;
        }

        /* Auth screens */
        .auth-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a10;
        }
        .auth-box {
            width: 320px;
            padding: 40px;
            background: #2a2a1a;
            border: 1px solid #4a4a30;
            border-radius: 4px;
        }
        .auth-box h1 {
            font-size: 24px;
            color: #c8b87a;
            margin-bottom: 4px;
            text-align: center;
        }
        .auth-subtitle {
            font-size: 14px;
            color: #8a7a50;
            text-align: center;
            margin-bottom: 24px;
            font-style: italic;
        }
        .auth-error {
            background: #3a1a1a;
            border: 1px solid #6a2a2a;
            color: #d49090;
            padding: 8px 12px;
            margin-bottom: 16px;
            border-radius: 3px;
            font-size: 13px;
        }
        .auth-box input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 12px;
            background: #1a1a10;
            border: 1px solid #4a4a30;
            border-radius: 3px;
            color: #d4c5a0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 14px;
        }
        .auth-box input::placeholder {
            color: #6a6a50;
        }
        .auth-box input:focus {
            outline: none;
            border-color: #8a7a50;
        }
        .auth-box button {
            width: 100%;
            padding: 10px;
            background: #4a4a30;
            border: 1px solid #6a6a40;
            border-radius: 3px;
            color: #d4c5a0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 14px;
            cursor: pointer;
            margin-top: 4px;
        }
        .auth-box button:hover {
            background: #5a5a38;
        }
        .auth-box button:disabled {
            opacity: 0.5;
            cursor: default;
        }
        .auth-toggle {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #8a7a50;
        }
        .auth-toggle a {
            color: #c8b87a;
            text-decoration: none;
        }
        .auth-toggle a:hover {
            text-decoration: underline;
        }
        .passphrase-display {
            background: #1a1a10;
            border: 2px solid #c8b87a;
            padding: 16px;
            margin: 16px 0;
            text-align: center;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            color: #c8b87a;
            letter-spacing: 1px;
            border-radius: 3px;
            user-select: all;
        }
        .auth-hint {
            font-size: 13px;
            color: #8a7a50;
            text-align: center;
            margin-bottom: 16px;
        }

        /* Top bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a10;
            border-bottom: 1px solid #3a3a20;
            padding: 0 16px;
        }
        .top-bar-left {
            font-size: 14px;
            color: #c8b87a;
            font-weight: bold;
        }
        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .top-bar-btn {
            background: none;
            border: 1px solid #4a4a30;
            color: #a09070;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 3px;
            cursor: pointer;
        }
        .top-bar-btn:hover {
            background: #2a2a1a;
            color: #c8b87a;
        }
        .top-bar-agent {
            font-size: 12px;
            color: #8a7a50;
        }

        /* Side panels */
        .side-panel {
            position: fixed;
            top: 40px;
            left: 0;
            right: 0;
            height: calc(100% - 40px);
            background: #1e1e12;
            border-top: 1px solid #3a3a20;
            z-index: 100;
            overflow-y: auto;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #3a3a20;
        }
        .panel-header h2 {
            font-size: 14px;
            color: #c8b87a;
            font-weight: normal;
        }
        .panel-close {
            background: none;
            border: none;
            color: #8a7a50;
            font-size: 14px;
            cursor: pointer;
            padding: 2px 6px;
        }
        .panel-close:hover {
            color: #c8b87a;
        }
        .panel-body {
            padding: 16px;
        }
        .field-group {
            margin-bottom: 16px;
        }
        .field-group label {
            display: block;
            font-size: 12px;
            color: #8a7a50;
            margin-bottom: 4px;
        }
        .field-group input {
            width: 100%;
            padding: 6px 10px;
            background: #1a1a10;
            border: 1px solid #4a4a30;
            border-radius: 3px;
            color: #d4c5a0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 13px;
        }
        .field-group input:focus {
            outline: none;
            border-color: #8a7a50;
        }
        .panel-btn {
            width: 100%;
            padding: 8px;
            background: #4a4a30;
            border: 1px solid #6a6a40;
            border-radius: 3px;
            color: #d4c5a0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 13px;
            cursor: pointer;
        }
        .panel-btn:hover {
            background: #5a5a38;
        }

        /* Editor panel */
        .editor-panel {
            position: fixed;
            top: 40px;
            left: 0;
            width: 240px;
            height: calc(100% - 40px);
            background: #1e1e12;
            border-right: 1px solid #3a3a20;
            z-index: 100;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .editor-tools {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            border-bottom: 1px solid #3a3a20;
        }
        .editor-tool-btn {
            flex: 1;
            padding: 6px 8px;
            background: #2a2a1a;
            border: 1px solid #4a4a30;
            border-radius: 3px;
            color: #a09070;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 12px;
            cursor: pointer;
        }
        .editor-tool-btn:hover:not(:disabled) {
            background: #3a3a28;
            color: #c8b87a;
        }
        .editor-tool-btn.active {
            background: #4a4a30;
            color: #c8b87a;
            border-color: #6a6a40;
        }
        .editor-tool-btn:disabled {
            opacity: 0.4;
            cursor: default;
        }
        .editor-catalog {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .catalog-section {
            margin-bottom: 4px;
        }
        .catalog-label {
            font-size: 11px;
            color: #8a7a50;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 6px 12px 4px;
        }
        .catalog-grid {
            display: flex;
            flex-direction: column;
        }
        .catalog-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .catalog-item:hover {
            background: #2a2a1a;
        }
        .catalog-item.selected {
            background: #3a3a28;
            border-color: #6a6a40;
        }
        .catalog-item canvas {
            flex-shrink: 0;
            background: #151510;
            border-radius: 3px;
        }
        .catalog-item-name {
            font-size: 12px;
            color: #a09070;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .top-bar-btn.editor-active {
            background: #4a4a30;
            color: #c8b87a;
            border-color: #8a7a50;
        }

        /* Tooltip */
        .village-tooltip {
            position: fixed;
            display: none;
            background: #1a1a10ee;
            border: 1px solid #4a4a30;
            color: #d4c5a0;
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 3px;
            pointer-events: none;
            z-index: 200;
            white-space: pre-line;
            line-height: 1.4;
        }

        /* Editor selection info */
        .editor-selection {
            padding: 8px 12px;
            border-bottom: 1px solid #3a3a20;
        }
        .selection-info {
            font-size: 13px;
            color: #c8b87a;
            margin-bottom: 8px;
        }
        .editor-selection select {
            width: 100%;
            padding: 4px 6px;
            background: #1a1a10;
            border: 1px solid #4a4a30;
            border-radius: 3px;
            color: #d4c5a0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 12px;
        }
        .editor-selection select:focus {
            outline: none;
            border-color: #8a7a50;
        }

        /* Panel tabs */
        .panel-tabs {
            display: flex;
            border-bottom: 1px solid #3a3a20;
        }
        .panel-tab {
            flex: 1;
            padding: 8px 12px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: #8a7a50;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 12px;
            cursor: pointer;
        }
        .panel-tab:hover {
            color: #c8b87a;
            background: #2a2a1a;
        }
        .panel-tab.active {
            color: #c8b87a;
            border-bottom-color: #c8b87a;
        }

        /* Assets panel */
        .panel-body-assets {
            padding: 16px 24px;
        }
        .assets-stats {
            font-size: 12px;
            color: #6a6a50;
            margin-bottom: 16px;
        }
        .assets-empty {
            color: #8a7a50;
            font-style: italic;
            text-align: center;
            padding: 24px;
        }
        .assets-category {
            margin-bottom: 24px;
        }
        .assets-category-header {
            font-size: 14px;
            color: #c8b87a;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid #3a3a20;
            padding-bottom: 6px;
            margin-bottom: 12px;
        }
        .assets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }
        .asset-card {
            background: #222218;
            border: 1px solid #3a3a20;
            border-radius: 4px;
            padding: 12px;
        }
        .asset-card-name {
            font-size: 14px;
            color: #d4c5a0;
            margin-bottom: 2px;
        }
        .asset-card-id {
            font-size: 11px;
            color: #6a6a50;
            font-family: 'Courier New', monospace;
            margin-bottom: 4px;
        }
        .asset-card-pack {
            font-size: 11px;
            color: #8a7a50;
            margin-bottom: 8px;
        }
        .asset-card-pack a {
            color: #a09070;
            text-decoration: none;
        }
        .asset-card-pack a:hover {
            color: #c8b87a;
            text-decoration: underline;
        }
        .asset-card-states {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .asset-card-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .asset-card-state canvas {
            background: #151510;
            border: 1px solid #2a2a1a;
            border-radius: 3px;
            image-rendering: pixelated;
        }
        .asset-state-label {
            font-size: 10px;
            color: #8a7a50;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .state-default .asset-state-label {
            color: #a09070;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
