name: "Client tests"

# Headless GDScript regression tests for the Godot client (client/tests/*.gd).
# Each test is a SceneTree script run with --script; it exits non-zero on failure,
# which fails the step. The --import step must run first: the tests load real assets
# (the lucide font for the source-activity marker), and a --script run does not
# populate the import cache the way the editor does.

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    godot-tests:
        name: GDScript client tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Install Godot 4.6.2 (headless)
              run: |
                  set -euo pipefail
                  ASSET="Godot_v4.6.2-stable_linux.x86_64"
                  curl -fsSL -o godot.zip "https://github.com/godotengine/godot/releases/download/4.6.2-stable/${ASSET}.zip"
                  unzip -q godot.zip
                  sudo mv "${ASSET}" /usr/local/bin/godot
                  sudo chmod +x /usr/local/bin/godot
                  godot --version

            - name: Import assets
              run: godot --headless --path client --import

            - name: Run marker transition tests
              run: godot --headless --path client --script res://tests/marker_transitions_test.gd
