name: "Client tests"

# Headless GDScript regression tests for the Godot client (client/tests/*_test.gd).
# Each test is a SceneTree script run with --script; it exits non-zero on failure,
# which fails the step. The --import step must run first: the tests load real assets
# (the lucide font for the source-activity marker), and a --script run does not
# populate the import cache the way the editor does.
#
# A non-zero exit is NOT sufficient on its own. A GDScript runtime error aborts only
# the function it happens in — the caller resumes at the next statement and the process
# still exits 0 — so a suite can report ALL PASS having skipped a whole test (LLM-480).
# The suites themselves catch aborts in a test function via a per-test completion mark;
# the SCRIPT ERROR check below is the backstop for the rest (an abort inside a shared
# helper, or in _initialize itself, which no in-harness mark can see).

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    godot-tests:
        name: GDScript client tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Install runtime dependencies
              # Headless Godot loads a font (the activity marker), so make the
              # fontconfig dependency explicit rather than lean on the runner image.
              run: sudo apt-get update && sudo apt-get install -y libfontconfig1

            - name: Install Godot 4.6.3 (headless)
              # Pin the release checksum — a downloaded binary is executed below.
              # Must match infrastructure/group_vars/all.yml godot_version: the
              # production client is exported by that version on the VPS, so a
              # skew here means CI tests a different engine than ships.
              run: |
                  set -euo pipefail
                  ASSET="Godot_v4.6.3-stable_linux.x86_64"
                  EXPECTED_SHA512="a035258da32b77f966a5376f9fa29c30a6adde826a85ba918e1605bd1fc9823eba7d85f1dd5e748956bd2ba72827c0025ffa11bb82aec91128c407a2e723c99c"
                  curl -fsSL -o godot.zip "https://github.com/godotengine/godot/releases/download/4.6.3-stable/${ASSET}.zip"
                  echo "${EXPECTED_SHA512}  godot.zip" | sha512sum -c -
                  unzip -q godot.zip
                  test -f "${ASSET}"
                  sudo mv "${ASSET}" /usr/local/bin/godot
                  sudo chmod +x /usr/local/bin/godot
                  godot --version

            - name: Import assets
              run: godot --headless --path client --import

            - name: Run client tests
              # Every client/tests/*_test.gd is picked up, so a new suite needs no
              # workflow change. Output goes to a file rather than a pipe into grep:
              # a pipe would report grep's status as the step's, masking Godot's.
              run: |
                  set -uo pipefail
                  failed=0
                  for path in client/tests/*_test.gd; do
                      name="$(basename "$path")"
                      log="$(mktemp)"
                      echo "::group::${name}"
                      godot --headless --path client --script "res://tests/${name}" >"${log}" 2>&1
                      status=$?
                      cat "${log}"
                      echo "::endgroup::"
                      if [ "${status}" -ne 0 ]; then
                          echo "::error::${name} exited ${status}"
                          failed=1
                      fi
                      if grep -q "SCRIPT ERROR" "${log}"; then
                          echo "::error::${name} hit a GDScript runtime error — a test was skipped, not passed"
                          failed=1
                      fi
                      rm -f "${log}"
                  done
                  exit "${failed}"
